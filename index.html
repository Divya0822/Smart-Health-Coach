<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Smart Student Health Coach</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #8ec5c5, #a8d5d3);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .container {
      width: 360px;
      background: #f4f6f5;
      border-radius: 18px;
      padding: 25px;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
    }

    h2 {
      text-align: center;
      color: #2f7d80;
      margin-bottom: 20px;
    }

    label {
      display: block;
      margin-top: 12px;
      font-size: 15px;
    }

    select,
    input {
      width: 100%;
      padding: 10px;
      margin-top: 6px;
      border-radius: 10px;
      border: 1px solid #ccc;
      box-sizing: border-box;
      font-size: 15px;
    }

    button {
      width: 100%;
      margin-top: 18px;
      padding: 12px;
      border: none;
      border-radius: 10px;
      background: #368486;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover {
      background: #2f7778;
    }

    .status {
      margin-top: 12px;
      font-size: 13px;
      color: #2f7d80;
      font-weight: 600;
      min-height: 18px;
    }

    .output {
      margin-top: 8px;
      background: #d7ece8;
      border-left: 5px solid #368486;
      border-radius: 12px;
      padding: 14px;
      min-height: 90px;
      white-space: pre-line;
      line-height: 1.5;
      transition: 0.2s;
    }

    .output.updated {
      box-shadow: 0 0 0 3px rgba(54, 132, 134, 0.2);
    }

    #historyBtn {
      position: fixed;
      bottom: 22px;
      right: 22px;
      background: #368486;
      color: white;
      border: none;
      border-radius: 50%;
      width: 58px;
      height: 58px;
      font-size: 22px;
      cursor: pointer;
      box-shadow: 0 6px 16px rgba(0, 0, 0, 0.2);
      z-index: 20;
    }

    #historyBtn:hover {
      background: #2f7778;
    }

    .modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.35);
      z-index: 30;
      padding: 20px;
      box-sizing: border-box;
    }

    .modal-content {
      background: white;
      width: 340px;
      max-width: 100%;
      margin: 70px auto 0 auto;
      padding: 20px;
      border-radius: 16px;
      max-height: 72vh;
      overflow-y: auto;
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.18);
    }

    .modal-content h3 {
      margin-top: 0;
      color: #2f7d80;
      text-align: center;
      margin-bottom: 14px;
    }

    .history-item {
      background: #f8f8f8;
      border-left: 4px solid #8bb9b7;
      padding: 10px;
      border-radius: 10px;
      margin-top: 10px;
      font-size: 13px;
      white-space: pre-line;
      line-height: 1.5;
    }

    .empty-history {
      color: #666;
      font-size: 14px;
      text-align: center;
      margin-top: 10px;
    }

    .close-btn {
      margin-top: 16px;
      background: #6c757d;
    }

    .close-btn:hover {
      background: #5a6268;
    }
  </style>
</head>

<body>
  <div class="container">
    <h2>🧠 Smart Student Health Coach</h2>

    <label for="time">Time Available</label>
    <select id="time">
      <option>10-15 min</option>
      <option>30 min</option>
      <option>1 hour+</option>
    </select>

    <label for="budget">Budget ($)</label>
    <input type="number" id="budget" placeholder="e.g. 10" min="0" />

    <label for="location">Location</label>
    <select id="location">
      <option>Campus</option>
      <option>Home</option>
      <option>Fast Food Area</option>
    </select>

    <label for="stress">Stress Level</label>
    <select id="stress">
      <option>Low</option>
      <option>Medium</option>
      <option>High</option>
    </select>

    <button onclick="getAdvice()">Get Advice</button>

    <div class="status" id="statusText"></div>

    <div class="output" id="output">Your health advice will appear here.</div>
  </div>

  <button id="historyBtn" title="View previous responses">📜</button>

  <div id="historyModal" class="modal">
    <div class="modal-content">
      <h3>Previous Responses</h3>
      <div id="historyList">
        <div class="empty-history" id="emptyHistory">No previous responses yet.</div>
      </div>
      <button class="close-btn" onclick="closeHistory()">Close</button>
    </div>
  </div>

  <script>
    let lastAdvice = "";
    let lastMeta = "";

    function getAdvice() {
      const time = document.getElementById("time").value;
      const budget = parseFloat(document.getElementById("budget").value) || 0;
      const location = document.getElementById("location").value;
      const stress = document.getElementById("stress").value;

      let meal = "";
      let exercise = "";
      let why = "";

      if (location === "Campus") {
        meal = budget <= 5
          ? "A banana, yogurt, and a simple sandwich from campus."
          : budget <= 12
          ? "A campus bowl with rice, vegetables, and some protein."
          : "A balanced dining hall meal with protein, vegetables, and carbs.";
      } else if (location === "Home") {
        meal = budget <= 5
          ? "Toast with eggs or oatmeal with fruit."
          : budget <= 12
          ? "Rice with vegetables and eggs or paneer."
          : "A full homemade meal with protein, vegetables, and grains.";
      } else {
        meal = budget <= 5
          ? "A basic wrap and water."
          : budget <= 12
          ? "A grilled sandwich, burrito bowl, or wrap instead of fried food."
          : "A filling grilled meal with a healthier side and water.";
      }

      if (time === "10-15 min") {
        exercise = stress === "High"
          ? "Take a 5–10 minute walk and do a short breathing break."
          : "Do a quick walk or light stretching.";
      } else if (time === "30 min") {
        exercise = stress === "High"
          ? "Take a 15-minute walk and then do light stretching."
          : "Try a 20-minute walk, stretching, or beginner workout.";
      } else {
        exercise = stress === "High"
          ? "Do a longer walk, gentle workout, and a short relaxation break."
          : "Do a full workout or a longer outdoor walk.";
      }

      why = stress === "High"
        ? "This helps lower stress and makes your routine feel manageable."
        : "This supports energy, focus, and overall balance.";

      const advice = `🍽️ Meal: ${meal}

🏃 Exercise: ${exercise}

💡 Why: ${why}`;

      const currentMeta = `Time: ${time}, Budget: $${budget}, Location: ${location}, Stress: ${stress}`;

      if (lastAdvice && lastAdvice !== advice) {
        addToHistory(lastMeta, lastAdvice);
        document.getElementById("statusText").innerText = "Updated based on new inputs.";
      } else if (!lastAdvice) {
        document.getElementById("statusText").innerText = "Advice generated.";
      } else {
        document.getElementById("statusText").innerText = "Same inputs → same result.";
      }

      const output = document.getElementById("output");
      output.innerText = advice;
      output.classList.add("updated");

      setTimeout(() => {
        output.classList.remove("updated");
      }, 500);

      lastAdvice = advice;
      lastMeta = currentMeta;
    }

    function addToHistory(meta, advice) {
      const historyList = document.getElementById("historyList");
      const emptyHistory = document.getElementById("emptyHistory");

      if (emptyHistory) {
        emptyHistory.remove();
      }

      const item = document.createElement("div");
      item.className = "history-item";
      item.innerText = `${meta}

${advice}`;

      historyList.prepend(item);
    }

    document.getElementById("historyBtn").addEventListener("click", function () {
      document.getElementById("historyModal").style.display = "block";
    });

    function closeHistory() {
      document.getElementById("historyModal").style.display = "none";
    }

    window.addEventListener("click", function (event) {
      const modal = document.getElementById("historyModal");
      if (event.target === modal) {
        closeHistory();
      }
    });
  </script>
</body>
</html>
